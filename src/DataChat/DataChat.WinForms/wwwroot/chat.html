<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DataChat</title>
  <style>
    :root {
      --bg: #f1f5f9;
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --user-bg: linear-gradient(135deg, #6366f1, #4f46e5);
      --assistant-bg: #ffffff;
      --code-bg: #0f172a;
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
    .header {
      flex-shrink: 0;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header .logo {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, #a78bfa, #6366f1 45%, #38bdf8);
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.35);
    }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header p { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .scroll {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      scroll-behavior: smooth;
    }
    .scroll::-webkit-scrollbar { width: 6px; }
    .scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 280px; text-align: center; color: var(--muted);
    }
    .empty .orb {
      width: 72px; height: 72px; border-radius: 50%; margin-bottom: 16px;
      background: radial-gradient(circle at 30% 30%, #a78bfa, #6366f1 45%, #38bdf8);
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.3);
    }
    .empty h2 { font-size: 18px; color: var(--text); margin-bottom: 8px; font-weight: 600; }
    .empty span { font-size: 13px; max-width: 280px; line-height: 1.6; }
    #messages { display: flex; flex-direction: column; gap: 16px; }
    .msg {
      display: flex; gap: 10px; max-width: 88%; animation: fadeIn 0.25s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }
    .avatar {
      flex-shrink: 0; width: 32px; height: 32px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600;
    }
    .msg.user .avatar { background: var(--user-bg); color: #fff; }
    .msg.assistant .avatar { background: #eef2ff; color: #4f46e5; border: 1px solid #e0e7ff; }
    .bubble {
      padding: 12px 14px; border-radius: var(--radius); line-height: 1.6;
      font-size: 14px; word-break: break-word;
    }
    .msg.user .bubble {
      background: var(--user-bg); color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
    }
    .msg.assistant .bubble {
      background: var(--assistant-bg); color: var(--text);
      border: 1px solid var(--border); border-bottom-left-radius: 4px;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
    }
    .msg.streaming .bubble { border-color: #93c5fd; box-shadow: 0 0 0 2px rgba(147, 197, 253, 0.35); }
    .msg.streaming .bubble::after {
      content: ''; display: inline-block; width: 6px; height: 14px;
      margin-left: 4px; background: #6366f1; border-radius: 2px;
      animation: blink 0.8s step-end infinite; vertical-align: text-bottom;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .bubble pre.code {
      display: block; margin: 10px 0 0; padding: 12px 14px;
      background: var(--code-bg); color: #e2e8f0; border-radius: 8px;
      font-size: 12px; overflow-x: auto; white-space: pre-wrap;
    }
    .bubble table.data-table {
      width: 100%; border-collapse: collapse; margin: 10px 0 0; font-size: 13px;
    }
    .bubble table.data-table th, .bubble table.data-table td {
      border: 1px solid var(--border); padding: 6px 10px; text-align: left;
    }
    .bubble table.data-table th { background: #f8fafc; font-weight: 600; }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo"></div>
    <div>
      <h1>DataChat 智能助手</h1>
      <p>多领域 Agent · 流式对话</p>
    </div>
  </header>
  <div class="scroll" id="scroll">
    <div class="empty" id="empty">
      <div class="orb"></div>
      <h2>开始对话</h2>
      <span>在下方输入问题，或从左侧选择历史会话</span>
    </div>
    <div id="messages"></div>
  </div>
  <script>
    function escapeHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function formatMarkdownTables(text) {
      var lines = text.split('\n');
      var out = [], tableRows = [];
      function flush() {
        if (tableRows.length < 2) { out.push.apply(out, tableRows); tableRows = []; return; }
        var header = tableRows[0].split('|').filter(function(c){return c.trim();}).map(function(c){return c.trim();});
        var body = tableRows.slice(2).map(function(row){
          return row.split('|').filter(function(c){return c.trim();}).map(function(c){return c.trim();});
        });
        var html = '<table class="data-table"><thead><tr>';
        header.forEach(function(h){ html += '<th>' + h + '</th>'; });
        html += '</tr></thead><tbody>';
        body.forEach(function(r){ html += '<tr>'; r.forEach(function(c){ html += '<td>' + c + '</td>'; }); html += '</tr>'; });
        html += '</tbody></table>';
        out.push(html); tableRows = [];
      }
      lines.forEach(function(line) {
        if (/^\|.*\|$/.test(line.trim())) tableRows.push(line.trim());
        else { flush(); out.push(line); }
      });
      flush();
      return out.join('\n');
    }
    function formatContent(text) {
      if (!text) return '';
      var parts = [], re = /```(\w*)\n([\s\S]*?)```/g, last = 0, m;
      while ((m = re.exec(text)) !== null) {
        parts.push({ type: 'text', value: text.slice(last, m.index) });
        parts.push({ type: 'code', value: m[2] });
        last = m.index + m[0].length;
      }
      parts.push({ type: 'text', value: text.slice(last) });
      return parts.map(function(p) {
        if (p.type === 'code') return '<pre class="code"><code>' + escapeHtml(p.value.trim()) + '</code></pre>';
        return formatMarkdownTables(escapeHtml(p.value)).replace(/\n/g, '<br>');
      }).join('');
    }
    function syncEmpty() {
      var empty = document.getElementById('empty');
      var has = document.getElementById('messages').children.length > 0;
      empty.style.display = has ? 'none' : 'flex';
    }
    function scrollBottom() {
      var el = document.getElementById('scroll');
      el.scrollTop = el.scrollHeight;
    }
    window.chatApi = {
      clear() { document.getElementById('messages').innerHTML = ''; syncEmpty(); },
      renderMessages(json) {
        var list = JSON.parse(json);
        this.clear();
        for (var i = 0; i < list.length; i++) this.appendMessage(list[i].id, list[i].role, list[i].content, false);
      },
      appendMessage(id, role, content, streaming) {
        var wrap = document.createElement('div');
        wrap.className = 'msg ' + role + (streaming ? ' streaming' : '');
        wrap.dataset.id = id;
        var av = role === 'user' ? '你' : 'AI';
        wrap.innerHTML =
          '<div class="avatar">' + av + '</div>' +
          '<div class="bubble">' + formatContent(content || '') + '</div>';
        document.getElementById('messages').appendChild(wrap);
        syncEmpty(); scrollBottom();
      },
      updateMessage(id, content, streaming) {
        var root = document.querySelector('[data-id="' + id + '"]');
        if (!root) return;
        var bubble = root.querySelector('.bubble');
        if (bubble) bubble.innerHTML = formatContent(content || '');
        root.classList.toggle('streaming', !!streaming);
        scrollBottom();
      }
    };
  </script>
</body>
</html>
